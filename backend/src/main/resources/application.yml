spring:
  application:
    name: memory-trainer-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/memory_trainer}
    username: ${SPRING_DATASOURCE_USERNAME:memory_user}
    password: ${SPRING_DATASOURCE_PASSWORD:memory_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
