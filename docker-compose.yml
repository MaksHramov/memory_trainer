services:
  postgres:
    image: postgres:16-alpine
    container_name: memory-trainer-db
    environment:
      POSTGRES_DB: memory_trainer
      POSTGRES_USER: memory_user
      POSTGRES_PASSWORD: memory_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_user -d memory_trainer"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: memory-trainer-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/memory_trainer
      SPRING_DATASOURCE_USERNAME: memory_user
      SPRING_DATASOURCE_PASSWORD: memory_pass
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: memory-trainer-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
